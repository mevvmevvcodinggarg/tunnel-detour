name: Release Beta

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Test
        run: swift test

      - name: Package
        run: ./package_release.sh dist

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/TunnelDetour.zip \
              dist/TunnelDetour.zip.sha256 \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/TunnelDetour.zip \
              dist/TunnelDetour.zip.sha256 \
              --verify-tag \
              --prerelease \
              --generate-notes \
              --title "TunnelDetour $GITHUB_REF_NAME (Beta)"
          fi
